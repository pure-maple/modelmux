name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/modelmux

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "mcp/modelmux/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Unit tests
        run: uv run --with pytest --with pytest-asyncio python -m pytest tests/ --ignore=tests/test_e2e.py -q

      - name: Import verification
        run: |
          uv run python -c "
          from modelmux.server import mcp
          print(f'modelmux {mcp.name} ready')
          "

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI Trusted Publisher
    environment:
      name: pypi
      url: https://pypi.org/project/modelmux/
    defaults:
      run:
        working-directory: mcp/modelmux

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "mcp/modelmux/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install build tools
        run: uv sync

      - name: Build package
        run: uv run python -m build

      - name: Validate package
        run: uv run twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp/modelmux/dist/

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          fail_on_unmatched_files: false
          generate_release_notes: false

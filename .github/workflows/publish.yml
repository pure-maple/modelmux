name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/modelmux

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "mcp/modelmux/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Unit tests
        run: |
          uv run python tests/test_detect.py
          uv run python tests/test_audit_policy.py

      - name: Import verification
        run: |
          uv run python -c "
          from modelmux.server import mcp
          print(f'modelmux {mcp.name} ready')
          "

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI Trusted Publisher
    environment:
      name: pypi
      url: https://pypi.org/project/modelmux/
    defaults:
      run:
        working-directory: mcp/modelmux

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "mcp/modelmux/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install build tools
        run: uv sync

      - name: Build package
        run: uv run python -m build

      - name: Validate package
        run: uv run twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp/modelmux/dist/
